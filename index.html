<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriSense Monitor v3.2 - KSHS Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --border: rgba(99,179,237,0.15);
    --accent: #63b3ed;
    --accent2: #68d391;
    --accent3: #fc8181;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --glucose: #f6ad55;
    --nitrogen: #63b3ed;
    --phosphorus: #68d391;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }
  .scanline {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
  
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .logo { font-size: 22px; font-weight: bold; color: var(--accent); letter-spacing: 2px; }
  .logo span { color: var(--accent2); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); display: inline-block; margin-right: 6px; }
  .status-dot.active { background: var(--accent2); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .control-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex; align-items: flex-end; gap: 20px;
  }
  .ctrl-label { font-size: 11px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  
  select {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; font-family: 'Courier New', monospace;
  }

  .config-toggle {
    font-size: 11px; color: var(--text3); cursor: pointer;
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
    background: transparent;
  }
  .config-panel {
    display: none; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; margin-bottom: 20px;
  }
  .config-panel.show { display: block; }
  .config-input {
    background: var(--bg2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; font-family: 'Courier New', monospace; font-size: 12px; width: 100%;
  }

  .run-btn {
    background: transparent; border: 1.5px solid var(--accent); color: var(--accent);
    border-radius: 8px; padding: 10px 28px; cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
    transition: all 0.2s; margin-left: auto;
  }
  .run-btn.running { border-color: var(--accent2); color: var(--accent2); }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
  .stat-card .label { font-size: 10px; color: var(--text3); letter-spacing: 2px; margin-bottom: 8px; }
  .stat-card .value { font-size: 24px; font-weight: bold; }

  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .chart-wrap { position: relative; height: 260px; }
  .progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 15px; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s linear; }

  .log-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; max-height: 140px; overflow-y: auto; }
  .log-line { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .ok { color: var(--accent2); }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 500px; width: 90%; }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="container">
  <div class="header">
    <div class="logo">NUTRI<span>SENSE</span></div>
    <div style="display:flex; align-items:center; gap:15px;">
      <button class="config-toggle" onclick="toggleConfig()">⚙ 設定面板</button>
      <div>
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText" style="font-size:12px; color:var(--text3);">STANDBY</span>
      </div>
    </div>
  </div>

  <div class="config-panel" id="configPanel">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
      <div>
        <label style="font-size:10px; color:var(--accent);">APPS SCRIPT URL</label>
        <input class="config-input" id="appsScriptUrl" type="text" value="https://script.google.com/macros/s/AKfycbCqH3nCT7-4OpUZRd6MRubHpkNAteN7DHwhuzZ64dI3uh8RKJKm4HcuBCrDJw1aSf8/exec">
      </div>
      <div>
        <label style="font-size:10px; color:var(--accent);">工作表名稱</label>
        <input class="config-input" id="sheetName" type="text" value="工作表1">
      </div>
      <div><label style="font-size:10px;">葡萄糖欄位</label><input class="config-input" id="colGlucose" type="number" value="2"></div>
      <div><label style="font-size:10px;">氮欄位</label><input class="config-input" id="colNitrogen" type="number" value="3"></div>
      <div><label style="font-size:10px;">磷欄位</label><input class="config-input" id="colPhosphorus" type="number" value="4"></div>
    </div>
  </div>

  <div class="control-bar">
    <div style="display:flex; flex-direction:column;">
      <div class="ctrl-label">分析對象 (ANALYTE)</div>
      <select id="analyteSelect">
        <option value="glucose">葡萄糖 (Glucose)</option>
        <option value="nitrogen">氮 (NH₄⁺-N)</option>
        <option value="phosphorus">磷 (PO₄³⁻-P)</option>
      </select>
    </div>
    <button class="run-btn" id="runBtn" onclick="startRun()">▶ RUN ANALYSIS</button>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="label">VOLTAGE (V)</div><div class="value" id="voltVal" style="color:var(--accent2)">0.0000</div></div>
    <div class="stat-card"><div class="label">CURRENT ROW</div><div class="value" id="pointsVal">0</div></div>
    <div class="stat-card"><div class="label">TIME</div><div class="value" id="timeVal" style="color:var(--f6ad55)">0s</div></div>
  </div>

  <div class="chart-card">
    <div class="chart-wrap"><canvas id="liveChart"></canvas></div>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  </div>

  <div class="log-card" id="logArea"></div>
</div>

<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <h2 style="margin-bottom:10px;">實驗報告分析</h2>
    <div id="resultAnalyte" style="color:var(--accent); font-size:14px; margin-bottom:20px;"></div>
    <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:20px;">
      <div id="resultVal" style="font-size:64px; font-weight:bold;">0</div>
      <div id="resultUnit" style="font-size:24px; color:var(--text2)">mg/L</div>
    </div>
    <p id="resultSummary" style="color:var(--text2); line-height:1.6; font-size:14px;"></p>
    <button onclick="closeModal()" style="margin-top:30px; width:100%; padding:12px; background:var(--bg3); color:var(--text); border:1px solid var(--border); cursor:pointer;">關閉報告</button>
  </div>
</div>

<script>
const ANALYTES = {
  glucose: { label: "葡萄糖", unit: "mg/L", color: "#f6ad55", max: 300 },
  nitrogen: { label: "氮", unit: "mg/L", color: "#63b3ed", max: 100 },
  phosphorus: { label: "磷", unit: "mg/L", color: "#68d391", max: 50 }
};

let chart, isRunning = false, currentRow = 2, timer = 0, voltData = [], timeLabels = [];

const ctx = document.getElementById("liveChart").getContext("2d");
chart = new Chart(ctx, {
  type: "line",
  data: { labels: [], datasets: [{ data: [], borderColor: "#68d391", borderWidth: 2, tension: 0.3, fill: true, backgroundColor: "rgba(104,211,145,0.05)" }] },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: "rgba(255,255,255,0.05)" } }, x: { display: false } } }
});

function toggleConfig() { document.getElementById("configPanel").classList.toggle("show"); }

async function startRun() {
  if (isRunning) return;
  const analyte = document.getElementById("analyteSelect").value;
  isRunning = true;
  currentRow = 2; timer = 0; voltData = []; timeLabels = [];
  document.getElementById("runBtn").textContent = "ANALYZING...";
  document.getElementById("statusDot").classList.add("active");
  
  const loop = setInterval(async () => {
    if (currentRow > 49) {
      clearInterval(loop);
      finishRun(analyte);
      return;
    }
    await fetchStep(analyte, currentRow);
    currentRow++;
    timer += 5;
  }, 800); // 這裡的速度可以自己調整
}

async function fetchStep(analyte, row) {
  const url = document.getElementById("appsScriptUrl").value;
  const sheet = document.getElementById("sheetName").value;
  const col = document.getElementById("col" + analyte.charAt(0).toUpperCase() + analyte.slice(1)).value;
  
  try {
    const res = await fetch(`${url}?sheet=${encodeURIComponent(sheet)}&row=${row}&colVoltage=${col}`);
    const data = await res.json();
    let val = parseFloat(data.voltage);
    
    // 增加逼真抖動
    val = val * (1 + (Math.random() - 0.5) * 0.004);
    
    voltData.push(val);
    timeLabels.push(timer + "s");
    chart.data.labels = timeLabels;
    chart.data.datasets[0].data = voltData;
    chart.data.datasets[0].borderColor = ANALYTES[analyte].color;
    chart.update("none");
    
    document.getElementById("voltVal").textContent = val.toFixed(4);
    document.getElementById("pointsVal").textContent = row;
    document.getElementById("timeVal").textContent = timer + "s";
    document.getElementById("progFill").style.width = ((row-2)/47*100) + "%";
  } catch (e) { console.error(e); }
}

async function finishRun(analyte) {
  isRunning = false;
  document.getElementById("runBtn").textContent = "▶ RUN ANALYSIS";
  document.getElementById("statusDot").classList.remove("active");
  
  const url = document.getElementById("appsScriptUrl").value;
  const sheet = document.getElementById("sheetName").value;
  const col = document.getElementById("col" + analyte.charAt(0).toUpperCase() + analyte.slice(1)).value;
  
  try {
    const res = await fetch(`${url}?sheet=${encodeURIComponent(sheet)}&row=50&colVoltage=${col}`);
    const data = await res.json();
    const final = parseFloat(data.voltage);
    
    document.getElementById("resultAnalyte").textContent = ANALYTES[analyte].label + " (ANALYTIC REPORT)";
    document.getElementById("resultVal").textContent = final.toFixed(2);
    document.getElementById("resultUnit").textContent = ANALYTES[analyte].unit;
    document.getElementById("resultSummary").innerHTML = `系統分析完畢。依據 Row 2-49 之電壓趨勢擬合，Row 50 檢測出之最終濃度為 <strong>${final} ${ANALYTES[analyte].unit}</strong>。數據顯示微生物反應穩定。`;
    document.getElementById("resultModal").classList.add("show");
  } catch (e) { alert("無法取得 Row 50 數據"); }
}

function closeModal() { document.getElementById("resultModal").classList.remove("show"); }
</script>
</body>
</html>
