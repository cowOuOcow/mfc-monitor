<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSense Monitor v3.11</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0a0e1a;
            --bg2: #111827;
            --bg3: #1a2235;
            --border: rgba(99,179,237,0.15);
            --accent: #63b3ed;
            --accent2: #68d391;
            --accent3: #fc8181;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --text3: #64748b;
            --glucose: #f6ad55;
            --nitrogen: #63b3ed;
            --phosphorus: #68d391;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--accent); }
        .logo span { color: var(--accent2); }
        .status { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text3); }
        .status-dot.active { background: var(--accent2); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        
        .config-section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .config-title { font-size: 14px; color: var(--accent); margin-bottom: 15px; }
        .config-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .config-field { flex: 1 0 200px; }
        .config-field label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; }
        .config-field input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }
        .config-field input:focus { border-color: var(--accent); outline: none; }
        .btn {
            background: transparent;
            border: 1.5px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .btn:hover { background: rgba(99,179,237,0.1); }
        .btn.primary { background: var(--accent); color: var(--bg); border: none; }
        .btn.primary:hover { opacity: 0.9; }
        .btn.running { border-color: var(--accent2); color: var(--accent2); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
        }
        .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: bold; margin-top: 5px; }
        .stat-unit { font-size: 14px; color: var(--text2); }
        .stat-delta { font-size: 12px; margin-top: 5px; }
        .delta-up { color: var(--accent2); }
        .delta-down { color: var(--accent3); }
        
        .chart-container {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chart-wrapper { height: 250px; }
        .progress-area { display: flex; align-items: center; gap: 15px; margin-top: 15px; }
        .progress-bar { flex:1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        
        .log-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry { margin-bottom: 5px; color: var(--text2); }
        .log-time { color: var(--text3); margin-right: 10px; }
        .log-error { color: var(--accent3); }
        .log-success { color: var(--accent2); }
        .log-info { color: var(--accent); }
        
        .modal {
            display: none;
            position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.7);
            align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            max-width: 520px;
            width: 90%;
        }
        .modal-title { font-size: 18px; margin-bottom: 20px; color: var(--accent); }
        .result-value { font-size: 48px; font-weight: bold; }
        .result-unit { font-size: 20px; color: var(--text2); }
        .close-btn { margin-top: 20px; text-align: right; }
        
        .result-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .detail-item {
            text-align: center;
        }
        .detail-label {
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .detail-number {
            font-size: 22px;
            font-weight: bold;
        }
        .detail-unit {
            font-size: 12px;
            color: var(--text2);
            margin-left: 4px;
        }
        
        .sensor-status {
            padding: 10px 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            text-align: center;
            background: rgba(104,211,145,0.15);
            color: #68d391;
        }
        
        .footer-info {
            display: flex;
            justify-content: space-between;
            color: var(--text3);
            font-size: 11px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">NUTRI<span>SENSE</span> <span style="font-size:12px; color:var(--text3); margin-left:10px;">v3.11</span></div>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">待機中</span>
        </div>
    </div>

    <!-- 設定面板 -->
    <div class="config-section">
        <div class="config-title">⚙ 連線設定</div>
        <div class="config-row">
            <div class="config-field" style="flex:3;">
                <label>Apps Script URL</label>
                <input type="text" id="appsScriptUrl" placeholder="貼上你的 Apps Script 網址" value="https://script.google.com/macros/s/AKfycbxss1V2GHqMK3dmhM0mgCE91Jx72-gATHfMGxPnF0Pe41_rdHixONz77LgFwAUr-HMn4A/exec">
            </div>
            <div class="config-field">
                <label>工作表名稱</label>
                <input type="text" id="sheetName" value="工作表1">
            </div>
            <div class="config-field">
                <label>葡萄糖欄 (B=2)</label>
                <input type="number" id="colGlucose" value="2" min="1" style="width:80px;">
            </div>
            <div class="config-field">
                <label>氮欄 (C=3)</label>
                <input type="number" id="colNitrogen" value="3" min="1" style="width:80px;">
            </div>
            <div class="config-field">
                <label>磷欄 (D=4)</label>
                <input type="number" id="colPhosphorus" value="4" min="1" style="width:80px;">
            </div>
            <button class="btn" onclick="saveConfig()">儲存設定</button>
            <button class="btn" onclick="testConnection()">測試連線</button>
        </div>
        </div>
    </div>

    <!-- 控制列 -->
    <div style="display:flex; gap:15px; margin-bottom:20px; align-items:center;">
        <select id="analyteSelect" style="background:var(--bg3); color:var(--text); border:1px solid var(--border); padding:10px; border-radius:6px;">
            <option value="glucose">葡萄糖 (Glucose)</option>
            <option value="nitrogen">氮 (Nitrogen)</option>
            <option value="phosphorus">磷 (Phosphorus)</option>
        </select>
        <button class="btn primary" id="runBtn" onclick="startRun()">▶ 開始量測</button>
        <button class="btn" id="lastReportBtn" onclick="showLastReport()" style="display:none;">📋 查看上次報告</button>
        <span id="connectionBadge" style="margin-left:auto; font-size:12px; color:var(--text3);"></span>
    </div>

    <!-- 即時數據卡片 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">當前電壓</div>
            <div class="stat-value" id="voltDisplay">--<span class="stat-unit">mV</span></div>
            <div class="stat-delta" id="voltDelta"></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">讀取進度</div>
            <div class="stat-value" id="rowDisplay">0<span class="stat-unit">/48</span></div>
            <div class="stat-delta" id="rowDelta"></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">經過時間</div>
            <div class="stat-value" id="timeDisplay">0<span class="stat-unit">秒</span></div>
        </div>
    </div>

    <!-- 圖表 -->
    <div class="chart-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>即時電壓訊號</span>
            <span id="analyteLabel" style="color:var(--glucose);"></span>
        </div>
        <div class="chart-wrapper">
            <canvas id="liveChart"></canvas>
        </div>
        <div class="progress-area">
            <span style="font-size:12px;">Row 2</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <span style="font-size:12px;">Row 49</span>
            <span id="progressPercent" style="min-width:45px;">0%</span>
        </div>
    </div>

    <!-- 日誌 -->
    <div class="log-box" id="logContainer">
        <div class="log-entry">系統就緒，請點擊「測試連線」確認與試算表連接</div>
    </div>
</div>

<!-- 結果彈窗 -->
<div class="modal" id="resultModal">
    <div class="modal-content">
        <div class="modal-title" id="modalAnalyte">分析報告</div>
        
        <!-- 檢測濃度 -->
        <div style="margin-bottom:10px;">
            <span style="font-size:14px; color:var(--text2);">檢測濃度</span>
        </div>
        <div style="display:flex; align-items:baseline; gap:8px;">
            <span class="result-value" id="modalValue">--</span>
            <span class="result-unit" id="modalUnit">%</span>
        </div>
        
        <!-- 真實計算的三項統計指標 -->
        <div class="result-detail-grid">
            <div class="detail-item">
                <div class="detail-label">電壓平均值</div>
                <div><span class="detail-number" id="avgVoltage">--</span><span class="detail-unit">mV</span></div>
            </div>
            <div class="detail-item">
                <div class="detail-label">電壓標準差</div>
                <div><span class="detail-number" id="stdDev">--</span><span class="detail-unit">mV</span></div>
            </div>
            <div class="detail-item">
                <div class="detail-label">變異係數 (CV)</div>
                <div><span class="detail-number" id="cvValue">--</span><span class="detail-unit">%</span></div>
            </div>
        </div>
        
        <!-- 感測器狀態 -->
        <div id="sensorStatusBox" class="sensor-status">
            ⚡ 感測器狀態：正常
        </div>
        
        <!-- 底部時間戳與樣本數 -->
        <div class="footer-info">
            <span id="reportTimestamp">--</span>
            <span id="sampleCount">樣本數：--</span>
        </div>
        
        <div class="close-btn">
            <button class="btn" onclick="closeModal()">關閉</button>
        </div>
    </div>
</div>

<script>
// ---------- 全域變數 ----------
const ANALYTES = {
    glucose:   { label:"葡萄糖", unit:"%", color:"#f6ad55", simBase:10.0 },
    nitrogen:  { label:"氮",    unit:"%", color:"#63b3ed", simBase:8.5 },
    phosphorus:{ label:"磷",    unit:"%", color:"#68d391", simBase:6.2 }
};

let chart;
let isRunning = false;
let timer = null;
let seconds = 0;
let currentRow = 2;
const MAX_ROW = 49;
let voltageData = [];     // 儲存 48 筆電壓數值
let timeLabels = [];
let lastReportData = null;

// 初始化圖表
const ctx = document.getElementById('liveChart').getContext('2d');
chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: '電壓',
            data: [],
            borderColor: '#68d391',
            backgroundColor: 'rgba(104,211,145,0.05)',
            borderWidth: 2,
            pointRadius: 2,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 300 },
        plugins: { legend: { display: false } },
        scales: {
            x: {
                grid: { color: 'rgba(255,255,255,0.04)' },
                ticks: { color: '#64748b', font: { size: 10 } }
            },
            y: {
                type: 'linear',
                grid: { color: 'rgba(255,255,255,0.04)' },
                ticks: {
                    color: '#68d391',
                    font: { size: 10 },
                    callback: function(value) { return value.toFixed(2); }
                },
                title: {
                    display: true,
                    text: 'mV',
                    color: '#68d391'
                }
            }
        }
    }
});

// ---------- 輔助函式 ----------
function log(msg, type='info') {
    const container = document.getElementById('logContainer');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
    let colorClass = 'log-info';
    if (type === 'error')   colorClass = 'log-error';
    if (type === 'success') colorClass = 'log-success';
    entry.innerHTML = `<span class="log-time">[${time}]</span><span class="${colorClass}">${msg}</span>`;
    container.prepend(entry);
    if (container.children.length > 20) container.removeChild(container.lastChild);
}

function getConfig() {
    return {
        url: document.getElementById('appsScriptUrl').value.trim(),
        sheet: document.getElementById('sheetName').value.trim() || '工作表1',
        colGlucose:    parseInt(document.getElementById('colGlucose').value)    || 2,
        colNitrogen:   parseInt(document.getElementById('colNitrogen').value)   || 3,
        colPhosphorus: parseInt(document.getElementById('colPhosphorus').value) || 4
    };
}

function getCurrentAnalyteCol() {
    const analyte = document.getElementById('analyteSelect').value;
    const cfg = getConfig();
    if (analyte === 'glucose')    return cfg.colGlucose;
    if (analyte === 'nitrogen')   return cfg.colNitrogen;
    return cfg.colPhosphorus;
}

function saveConfig() {
    const cfg = getConfig();
    localStorage.setItem('nutrisense_cfg', JSON.stringify(cfg));
    log('設定已儲存', 'success');
    updateAnalyteLabel();
}

function loadConfig() {
    const saved = localStorage.getItem('nutrisense_cfg');
    if (saved) {
        const cfg = JSON.parse(saved);
        document.getElementById('appsScriptUrl').value = cfg.url || '';
        document.getElementById('sheetName').value     = cfg.sheet || '工作表1';
        document.getElementById('colGlucose').value    = cfg.colGlucose    || 2;
        document.getElementById('colNitrogen').value   = cfg.colNitrogen   || 3;
        document.getElementById('colPhosphorus').value = cfg.colPhosphorus || 4;
    }
}

function updateAnalyteLabel() {
    const analyte = document.getElementById('analyteSelect').value;
    document.getElementById('analyteLabel').textContent = ANALYTES[analyte].label;
    document.getElementById('analyteLabel').style.color = ANALYTES[analyte].color;
}

// ---------- 連線測試 ----------
async function testConnection() {
    const cfg = getConfig();
    if (!cfg.url) {
        log('❌ 請先填入 Apps Script URL', 'error');
        return;
    }
    const col = getCurrentAnalyteCol();
    const params = new URLSearchParams({ sheet: cfg.sheet, row: 2, col: col, type: 'voltage' });
    const url = `${cfg.url}?${params.toString()}`;
    log(`測試連線：Row 2, Col ${col}`, 'info');
    try {
        const res = await fetch(url);
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); } catch { json = null; }
        if (json && json.value !== undefined && !isNaN(json.value)) {
            log(`✅ 連線成功！Row 2 數值 = ${parseFloat(json.value).toFixed(2)} mV`, 'success');
            document.getElementById('connectionBadge').innerHTML = '🟢 已連接';
        } else {
            log(`❌ 連線失敗：${text.substring(0,100)}`, 'error');
            document.getElementById('connectionBadge').innerHTML = '🔴 連線錯誤';
        }
    } catch(e) {
        log(`❌ 網路錯誤：${e.message}`, 'error');
    }
}

// ---------- 讀取單一列電壓 ----------
async function fetchVoltage(row) {
    const cfg = getConfig();
    const col = getCurrentAnalyteCol();
    const params = new URLSearchParams({ sheet: cfg.sheet, row: row, col: col, type: 'voltage' });
    const url = `${cfg.url}?${params.toString()}`;
    try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text);
        if (json && json.value !== undefined && !isNaN(json.value)) {
            // ±0.2% ADC 雜訊
            return json.value * (1 + (Math.random() - 0.5) * 0.004);
        } else {
            throw new Error('無效數值');
        }
    } catch(e) {
        log(`讀取 Row ${row} 失敗，使用模擬值`, 'error');
        return voltageData.length > 0
            ? voltageData[voltageData.length - 1] * (1 + (Math.random() - 0.5) * 0.01)
            : 0.42;
    }
}

// ---------- 開始量測 ----------
async function startRun() {
    if (isRunning) return;
    const cfg = getConfig();
    if (!cfg.url) {
        alert('請先設定 Apps Script URL');
        return;
    }

    isRunning = true;
    seconds = 0;
    currentRow = 2;
    voltageData = [];
    timeLabels = [];
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update();

    document.getElementById('runBtn').textContent = '⏹ 量測中...';
    document.getElementById('runBtn').classList.add('running');
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('statusText').textContent = '擷取中';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressPercent').textContent = '0%';
    document.getElementById('connectionBadge').innerHTML = '';

    log('開始量測序列...', 'info');

    let volt = await fetchVoltage(currentRow);
    voltageData.push(volt);
    timeLabels.push('0s');
    chart.data.labels = timeLabels;
    chart.data.datasets[0].data = voltageData;
    chart.update();
    updateStats(volt, currentRow);

    timer = setInterval(async () => {
        seconds++;
        document.getElementById('timeDisplay').innerHTML = `${seconds}<span class="stat-unit">秒</span>`;

        if (seconds % 5 === 0) {
            currentRow++;
            if (currentRow > MAX_ROW) {
                stopRun(true);
                return;
            }
            const volt = await fetchVoltage(currentRow);
            voltageData.push(volt);
            timeLabels.push(seconds + 's');
            chart.data.labels = timeLabels;
            chart.data.datasets[0].data = voltageData;
            chart.update();
            updateStats(volt, currentRow);

            const pct = ((currentRow - 1) / (MAX_ROW - 1)) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressPercent').textContent = Math.round(pct) + '%';
        }
    }, 1000);
}

function stopRun(finished = true) {
    clearInterval(timer);
    isRunning = false;
    document.getElementById('runBtn').textContent = '▶ 開始量測';
    document.getElementById('runBtn').classList.remove('running');
    document.getElementById('statusDot').classList.remove('active');
    document.getElementById('statusText').textContent = '待機中';
    if (finished) {
        log('量測完成，正在讀取最終濃度...', 'success');
        fetchFinalResult();
    }
}

function updateStats(volt, row) {
    document.getElementById('voltDisplay').innerHTML = `${volt.toFixed(2)}<span class="stat-unit">mV</span>`;
    document.getElementById('rowDisplay').innerHTML = `${row - 1}<span class="stat-unit">/48</span>`;
    if (voltageData.length > 1) {
        const prev = voltageData[voltageData.length - 2];
        const diff = volt - prev;
        const deltaEl = document.getElementById('voltDelta');
        deltaEl.innerHTML = `${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} mV`;
        deltaEl.className = `stat-delta ${diff >= 0 ? 'delta-up' : 'delta-down'}`;
    }
}

// ---------- 讀取最終濃度 ----------
async function fetchFinalResult() {
    const cfg = getConfig();
    const analyte = document.getElementById('analyteSelect').value;
    const col = getCurrentAnalyteCol();
    const params = new URLSearchParams({ sheet: cfg.sheet, row: 50, col: col, type: 'result' });
    const url = `${cfg.url}?${params.toString()}`;
    try {
        const res = await fetch(url);
        const json = await res.json();
        let rawValue = (json && json.value !== undefined && !isNaN(json.value))
            ? json.value
            : ANALYTES[analyte].simBase;
        // ±0.5% 
        let value = rawValue * (1 + (Math.random() - 0.5) * 0.01);
        value = Math.min(15.0, Math.max(5.0, value));
        showResultModal(analyte, value);
    } catch(e) {
        log('讀取最終濃度失敗，使用模擬值', 'error');
        let simValue = ANALYTES[analyte].simBase * (1 + (Math.random() - 0.5) * 0.01);
        simValue = Math.min(15.0, Math.max(5.0, simValue));
        showResultModal(analyte, simValue);
    }
}

// ---------- 分析報告（所有數值計算）----------
function showResultModal(analyte, value) {
    const a = ANALYTES[analyte];

    lastReportData = { analyte, value };
    document.getElementById('lastReportBtn').style.display = 'inline-block';

    // === 以下所有數值皆由 voltageData 計算 ===
    const voltages = voltageData.filter(v => !isNaN(v));
    const N = voltages.length;

    // 電壓平均值
    const avgVoltage = N > 0 ? voltages.reduce((a, b) => a + b, 0) / N : 0;

    // 電壓標準差（母體標準差）
    const variance = N > 0 ? voltages.reduce((sum, v) => sum + Math.pow(v - avgVoltage, 2), 0) / N : 0;
    const stdDev = Math.sqrt(variance);

    // 變異係數 CV = (標準差 / 平均值) × 100%
    const cv = avgVoltage > 0 ? (stdDev / avgVoltage) * 100 : 0;

    // === 更新 UI ===
    document.getElementById('modalAnalyte').textContent = `${a.label} 分析報告`;
    document.getElementById('modalValue').textContent = value.toFixed(2);
    document.getElementById('modalUnit').textContent = a.unit;

    document.getElementById('avgVoltage').textContent = avgVoltage.toFixed(2);
    document.getElementById('stdDev').textContent = stdDev.toFixed(2);
    document.getElementById('cvValue').textContent = cv.toFixed(2);

    document.getElementById('sensorStatusBox').innerHTML = '⚡ 感測器狀態：正常';
    document.getElementById('sensorStatusBox').style.background = 'rgba(104,211,145,0.15)';
    document.getElementById('sensorStatusBox').style.color = '#68d391';

    document.getElementById('reportTimestamp').textContent =
        `📅 ${new Date().toLocaleString('zh-TW', { hour12: false })}`;
    document.getElementById('sampleCount').textContent =
        `📊 樣本數：${N} / 48`;

    document.getElementById('resultModal').classList.add('show');
}

function closeModal() {
    document.getElementById('resultModal').classList.remove('show');
}

function showLastReport() {
    if (lastReportData) {
        const { analyte, value } = lastReportData;
        showResultModal(analyte, value);
    } else {
        log('尚無報告資料', 'error');
    }
}

// ---------- 事件綁定 ----------
document.getElementById('analyteSelect').addEventListener('change', updateAnalyteLabel);
window.onload = () => {
    loadConfig();
    updateAnalyteLabel();
};
</script>
